<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="xterm.css"/>
<style>
    html, body { margin: 0; height: 100%; background: #000000; overflow: hidden; }
    /* Terminal scrollbar: slim gutter matching the sidebar's, permanently reserved
       beside the text (fit subtracts its width from the grid, so no overlap and no
       shift on reveal). Invisible until the pointer is near the right edge
       (.scroll-hot, toggled in JS). */
    .xterm-viewport::-webkit-scrollbar { width: 5px; }
    .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: transparent; }
    .term.scroll-hot .xterm-viewport::-webkit-scrollbar-thumb { background: #3A3A3A; }
    .term.scroll-hot .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #4A4A55; }
    /* visibility (not display): hidden panes keep their layout size, so terminals can
       be fitted to their real dimensions BEFORE any output is written into them.
       If a terminal's grid ever differs from what ConPTY believes, the shell's absolute
       cursor addressing paints in the wrong places. */
    .term { position: absolute; inset: 0; padding: 10px 6px 12px 14px; visibility: hidden; }
    .term.active { visibility: visible; }
</style>
</head>
<body>
<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script>
    // One xterm.js instance per Shellf session, all hosted in this single page.
    // Plain interactive terminals: keystrokes go straight to the pty. The shells
    // still emit OSC 9;9 (cwd, parsed by TerminalHostService) and OSC 133 block
    // marks — unhandled here for now, reserved for the block UI planned next version.
    // Protocol with C# (TerminalHostView):
    //   C# -> JS: {type:'create', id, data(b64)} {type:'write', id, data(b64)} {type:'show', id} {type:'dispose', id}
    //   JS -> C#: {type:'ready'} {type:'input', id, data} {type:'resize', id, cols, rows}
    const HOST = window.chrome.webview;
    const sessions = new Map();
    let activeId = "";

    const THEME = {
        background: "#000000",
        foreground: "#D0D0D0",
        cursor: "#EDEDED",
        cursorAccent: "#000000",
        selectionBackground: "#333333",
    };

    function b64ToBytes(b64) {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
    }

    function syncSize(id, s) {
        s.fit.fit();
        // Explicit, unconditional: keeps ConPTY in lockstep even when xterm's dims did
        // not change (fit fires onResize only on a change), and the resize makes
        // conhost repaint the viewport, which self-heals any stale content.
        HOST.postMessage({ type: "resize", id, cols: s.term.cols, rows: s.term.rows });
    }

    function create(id, initialB64) {
        if (sessions.has(id)) return;

        const el = document.createElement("div");
        el.className = "term";
        document.body.appendChild(el);

        // Reveal the scrollbar only while the pointer is in the right-edge gutter
        // (a tracked zone, not an overlay div, so text selection stays unaffected).
        el.addEventListener("mousemove", ev => {
            const r = el.getBoundingClientRect();
            el.classList.toggle("scroll-hot", r.right - ev.clientX <= 24);
        });
        el.addEventListener("mouseleave", () => el.classList.remove("scroll-hot"));

        const term = new Terminal({
            theme: THEME,
            fontFamily: '"Geist Mono", "Cascadia Mono", Consolas, monospace',
            fontSize: 14,
            cursorBlink: true,
            scrollback: 5000,
            allowProposedApi: true,
        });
        const fit = new FitAddon.FitAddon();
        term.loadAddon(fit);

        term.onData(data => HOST.postMessage({ type: "input", id, data }));
        term.onResize(size => HOST.postMessage({ type: "resize", id, cols: size.cols, rows: size.rows }));
        term.open(el);

        const s = { term, fit, el };
        sessions.set(id, s);

        // Order matters: reach final size FIRST, then write the replayed output.
        syncSize(id, s);
        if (initialB64) term.write(b64ToBytes(initialB64));

        // The 'show' for a brand-new tab can arrive before its 'create'; self-heal here.
        if (activeId === id) show(id);
    }

    function show(id) {
        activeId = id;
        for (const [sid, s] of sessions) {
            const active = sid === id;
            s.el.classList.toggle("active", active);
            if (active) {
                syncSize(sid, s);
                s.term.focus();
            }
        }
    }

    function dispose(id) {
        const s = sessions.get(id);
        if (!s) return;
        s.term.dispose();
        s.el.remove();
        sessions.delete(id);
    }

    HOST.addEventListener("message", e => {
        const m = e.data;
        switch (m.type) {
            case "create": create(m.id, m.data); break;
            case "write": { const s = sessions.get(m.id); if (s) s.term.write(b64ToBytes(m.data)); break; }
            case "show": show(m.id || ""); break;
            case "dispose": dispose(m.id); break;
        }
    });

    // Refit every pane (they all share the same geometry), so hidden tabs are already
    // correct when the user switches to them. Debounced against resize-drag floods.
    let resizeTimer = 0;
    window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            for (const [sid, s] of sessions) syncSize(sid, s);
        }, 50);
    });

    // Measure the pane's cell grid before any session spawns, so shells start at
    // the right size and never receive an initial resize repaint.
    function measureGrid() {
        const el = document.createElement("div");
        el.className = "term active";
        document.body.appendChild(el);
        const probe = new Terminal({ fontFamily: '"Geist Mono", "Cascadia Mono", Consolas, monospace', fontSize: 14 });
        const probeFit = new FitAddon.FitAddon();
        probe.loadAddon(probeFit);
        probe.open(el);
        const dims = probeFit.proposeDimensions();
        probe.dispose();
        el.remove();
        return dims && dims.cols > 0 && dims.rows > 0 ? dims : { cols: 120, rows: 30 };
    }

    const grid = measureGrid();
    HOST.postMessage({ type: "ready", cols: grid.cols, rows: grid.rows });
</script>
</body>
</html>
